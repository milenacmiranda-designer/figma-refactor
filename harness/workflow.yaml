workflow:
  discovery:
    agent: null
    next: audit
    requires:
      - figma_link_exists
      - scope_identified
      - mcp_connected
      - state_initialized

  audit:
    agent: figma-auditor
    next: plan
    requires:
      - audit_report_exists
      - inventory_created
      - risks_documented
      - no_write_actions

  plan:
    agent: null
    next: backup
    requires:
      - change_plan_exists
      - scope_locked
      - affected_nodes_listed
      - forbidden_changes_listed

  backup:
    agent: null
    next: foundations
    requires:
      - backup_created
      - archive_location_registered
      - original_preserved
      - variables_snapshot_exists    # export .fig OU snapshot de texto de todas as variables
      - components_snapshot_exists   # lista de component sets existentes registrada
      - rollback_procedure_documented

  foundations:
    agent: figma-foundations
    next: organization
    requires:
      - existing_styles_checked
      - existing_variables_checked
      - mapping_created
      - visual_validation_passed
      # validações reais via MCP — não basta o agente "dizer" que criou
      - figma_variables_created          # collection Primitives existe e tem >0 variables
      - figma_semantic_aliases_created   # collection Semantic existe e suas variables são aliases
      - figma_modes_configured           # quando aplicável (light/dark)

  organization:
    agent: figma-file-organizer
    next: auto_layout
    requires:
      - pages_organized
      - sections_created
      - frames_aligned
      - archive_updated
      - visual_validation_passed

  auto_layout:
    agent: figma-system-builder
    next: components
    requires:
      - structural_groups_removed
      - spacing_layers_removed
      - hug_fill_fixed_reviewed
      - responsive_behavior_checked
      - visual_validation_passed

  components:
    agent: figma-system-builder
    next: use_in_screens
    requires:
      - component_candidates_reviewed
      - duplicate_components_checked
      - variants_reviewed
      - overrides_preserved
      - visual_validation_passed
      # validações reais via MCP — componente master de verdade
      - figma_component_sets_created       # nó retorna como COMPONENT_SET, não FRAME
      - figma_variant_properties_present   # variant set tem as properties planejadas
      - figma_variables_bound              # fills/strokes/spacing usam variable IDs, não literais
      - figma_text_boolean_swap_props_used # conteúdo variável via property, não nova variante

  use_in_screens:
    agent: figma-system-builder
    next: qa
    requires:
      - instances_swapped_in_screens       # elementos repetidos nas telas substituídos por instâncias
      - overrides_preserved_after_swap     # overrides de texto/ícone mantidos após instance swap
      - no_detached_instances              # nenhuma instância desconectada do master
      - visual_regression_check_passed     # screenshot antes/depois de cada tela confirma sem diff visual acidental
      - swap_log_complete                  # change-log registra cada substituição com node ID e tela

  qa:
    agent: figma-qa
    next: publish
    requires:
      - qa_report_exists
      - no_critical_failure
      - regression_check_passed
      - scores_above_minimum              # todos os scores do QA report acima do mínimo definido

  publish:
    agent: null
    next: approval
    requires:
      - human_approval_to_publish         # publicar afeta outros arquivos que consomem a library
      - library_publish_confirmed         # componentes e variables publicados como library
      - publish_log_exists                # registrar o que foi publicado e quando
      - consumer_files_notified           # avisar arquivos consumidores sobre updates (se houver)

  code_connect:
    agent: figma-code-connect
    optional: true                      # só executa se usuário confirmar
    next: approval
    requires:
      - publish_completed               # componentes precisam estar publicados
      - codebase_available              # projeto tem componentes de código identificados
      - human_approval_to_map           # usuário confirmou que quer o mapeamento
      - mapping_proposal_approved       # mapeamento Figma↔código aprovado antes de registrar
      - code_connect_registered         # add_code_connect_map chamado para cada componente
      - inspect_verified                # snippet aparece corretamente no Inspect

  approval:
    agent: null
    next: done
    requires:
      - human_approval_received
      - reports_complete
      - state_updated
